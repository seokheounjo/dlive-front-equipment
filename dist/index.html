    <style>
      /* iOS/Android 호환성 - 전역 설정 */
      html, body {
        height: 100vh;
        height: 100dvh; /* iOS 동적 뷰포트 */
        -webkit-text-size-adjust: 100%; /* iOS 텍스트 줌 방지 */
        text-size-adjust: 100%;
        overflow: hidden; /* 전체 스크롤 완전 차단 */
        overflow-x: hidden; /* 가로 스크롤 완전 차단 */
        position: fixed; /* iOS 바운스 스크롤 방지 */
        width: 100%;
        max-width: 100vw; /* 가로 넘침 방지 */
        touch-action: pan-y; /* 세로 스크롤만 허용, 핀치줌 차단 */
      }

      /* 루트 컨테이너 - 스크롤 차단 */
      #root {
        overflow: hidden;
        overflow-x: hidden;
        width: 100%;
        max-width: 100vw;
        height: 100%;
        position: fixed;
        top: 0;
        left: 0;
      }

      /* 모든 요소 - 가로 넘침 방지 + 스크롤바 숨기기 */
      * {
        max-width: 100vw;
        box-sizing: border-box;
        -ms-overflow-style: none;  /* IE, Edge */
        scrollbar-width: none;  /* Firefox */
      }
      *::-webkit-scrollbar {
        display: none;  /* Chrome, Safari, Opera */
      }

      /* 토스 스타일 탭 메뉴 스타일 - 모바일 최적화 */
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
        -webkit-overflow-scrolling: touch; /* iOS 부드러운 스크롤 */
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }

      /* 모바일 터치 스크롤 최적화 */
      .mobile-scroll {
        overscroll-behavior-x: contain;
        scroll-snap-type: x mandatory;
      }

      .mobile-scroll > * {
        scroll-snap-align: start;
      }

      /* 모바일 터치 최적화 - 더블탭 확대 방지 */
      .touch-manipulation {
        touch-action: manipulation;
      }

      /* 더블탭 확대 방지 */
      button, a, input, select, textarea, label {
        touch-action: manipulation;
      }

      /* 모바일에서 호버 효과 제거 */
      @media (hover: none) and (pointer: coarse) {
        .hover\:text-gray-900:hover {
          color: inherit;
        }
        .hover\:bg-gray-100:hover {
          background-color: inherit;
        }
      }


      /* 하위 메뉴 아이템 호버 효과 */
      .submenu-item {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .submenu-item:hover {
        transform: translateY(-2px) scale(1.02);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      /* 페이드인 애니메이션 제거 */

      /* 라인 클램프 */
      .line-clamp-2 {

        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* 토스트 애니메이션 */
      @keyframes slide-down {
        from {

          transform: translate(-50%, -20px);
        }
        to {
          opacity: 1;
          transform: translate(-50%, 0);
        }
      }

      .animate-slide-down {
        animation: slide-down 0.3s ease-out;
      }

  <body class="bg-gray-100 text-gray-800">
    <div id="root"></div>
    <script>
      // Service Worker 등록
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            await navigator.serviceWorker.register('/sw.js');
            console.log('[PWA] Service Worker 등록 완료');
          } catch (err) {
            console.log('[PWA] Service Worker 등록 실패:', err);
          }
        });
      }

      // Push 구독 함수 (버튼 클릭 시 호출 — iOS 호환)
      window.__subscribePush = async function() {
        try {
          if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
            return { status: 'unsupported' };
          }
          const permission = await Notification.requestPermission();
          if (permission !== 'granted') {
            return { status: 'denied' };
          }
          const reg = await navigator.serviceWorker.ready;
          const res = await fetch('/push/vapid-public-key');
          const { publicKey } = await res.json();
          const applicationServerKey = Uint8Array.from(
            atob(publicKey.replace(/-/g, '+').replace(/_/g, '/')),
            c => c.charCodeAt(0)
          );
          const subscription = await reg.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey
          });
          await fetch('/push/subscribe', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(subscription)
          });
          console.log('[PWA] Push 구독 완료');
          return { status: 'granted' };
        } catch (err) {
          console.log('[PWA] Push 구독 실패:', err);
          return { status: 'error', message: err.message };
        }
      };

      // Push 구독 해제
      window.__unsubscribePush = async function() {
        try {
          const reg = await navigator.serviceWorker?.ready;
          const subscription = await reg?.pushManager?.getSubscription();
          if (subscription) {
            await fetch('/push/unsubscribe', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ endpoint: subscription.endpoint })
            });
            await subscription.unsubscribe();
            console.log('[PWA] Push 구독 해제');
          }
          return { status: 'unsubscribed' };
        } catch (err) {
          console.log('[PWA] Push 구독 해제 실패:', err);
          return { status: 'error', message: err.message };
        }
      };

      // Push 구독 상태 확인
      window.__getPushStatus = async function() {
        if (!('Notification' in window)) return 'unsupported';
        if (Notification.permission === 'granted') {
          const reg = await navigator.serviceWorker?.ready;
          const sub = await reg?.pushManager?.getSubscription();
          return sub ? 'subscribed' : 'granted';
        }
        return Notification.permission; // 'default' or 'denied'
      };
    </script>
